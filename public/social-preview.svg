<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <!-- Vibrant blue gradient for the checkmark swoop -->
    <linearGradient id="og-checkmark-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#025eff" />
      <stop offset="50%" stop-color="#0080ff" />
      <stop offset="100%" stop-color="#00c0ff" />
    </linearGradient>
    
    <!-- 3D gradient for the bar charts -->
    <linearGradient id="og-bar-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#004eff" />
      <stop offset="100%" stop-color="#33ccff" />
    </linearGradient>
    
    <!-- Deep blur filter to replicate the soft-focus laptop/desk background -->
    <filter id="og-bg-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" />
    </filter>

    <!-- Professional drop shadow for content pop -->
    <filter id="og-pop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#004eff" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- 1. Background Layer (Soft workspace/laptop vignette) -->
  <rect width="1200" height="630" fill="#f8fafc" />
  
  <!-- Stylized workspace shapes that merge beautifully under heavy Gaussian blur -->
  <g filter="url(#og-bg-blur)" opacity="0.45">
    <!-- Desk warm tones -->
    <ellipse cx="600" cy="550" rx="700" ry="250" fill="#eedcc5" />
    <!-- Laptop keyboard/base silver -->
    <path d="M 250 500 L 950 500 L 1100 650 L 100 650 Z" fill="#cbd5e1" />
    <!-- Laptop screen glow -->
    <rect x="350" y="150" width="500" height="320" rx="16" fill="#ffffff" />
    <rect x="380" y="180" width="440" height="260" fill="#93c5fd" opacity="0.3" />
    <!-- Blurred human arms/coffee cup outlines -->
    <circle cx="200" cy="450" r="80" fill="#f5ebe0" />
    <circle cx="1020" cy="480" r="60" fill="#e2e8f0" />
    <ellipse cx="900" cy="420" rx="120" ry="80" fill="#f1f5f9" />
  </g>

  <!-- Subtle overlay gradient for rich contrast -->
  <rect width="1200" height="630" fill="transparent" opacity="1" />

  <!-- 2. Main Branding Container (Perfectly Centered & Crisply Structured) -->
  <g transform="translate(180, 160)" filter="url(#og-pop-shadow)">
    
    <!-- Left-aligned Logo Symbol -->
    <g transform="translate(0, 20) scale(1.15)">
      <!-- The V-shaped Swoop Checkmark -->
      <path d="M 50 148 
               C 50 148, 70 140, 90 170 
               C 110 200, 120 230, 128 228 
               C 135 225, 175 185, 210 145 
               C 230 120, 248 135, 235 155 
               C 210 195, 168 245, 142 265 
               C 125 278, 112 265, 98 235 
               C 85 205, 65 160, 50 148 Z" 
            fill="url(#og-checkmark-grad)" />
            
      <path d="M 128 228
               C 130 220, 185 155, 245 132
               C 252 130, 252 142, 240 155
               C 190 210, 142 265, 142 265
               Z" 
            fill="#005eff" opacity="0.8" />

      <!-- Three growing bars of the bar-chart -->
      <!-- Bar 1 (Short) -->
      <polygon points="122,170 142,160 142,215 122,225" fill="url(#og-bar-grad)" />
      
      <!-- Bar 2 (Medium) -->
      <polygon points="152,125 172,115 172,190 152,205" fill="url(#og-bar-grad)" />
      
      <!-- Bar 3 (Tall) -->
      <polygon points="182,75 202,65 202,158 182,175" fill="url(#og-bar-grad)" />

      <!-- Curved arc of growing dots overhead -->
      <circle cx="118" cy="158" r="4.5" fill="#33ccff" />
      <circle cx="126" cy="136" r="5" fill="#2ebfff" />
      <circle cx="137" cy="116" r="5.5" fill="#29b3ff" />
      <circle cx="151" cy="98" r="6" fill="#1f9eff" />
      <circle cx="169" cy="83" r="6.5" fill="#148aff" />
      <circle cx="190" cy="71" r="7" fill="#0a75ff" />
      <circle cx="214" cy="63" r="7.5" fill="#0060ff" />
      <circle cx="240" cy="58" r="8" fill="#004eff" />
    </g>

    <!-- Right-aligned Text Elements (Optimized Typography & Spacing) -->
    <g transform="translate(305, 120)">
      <!-- VibeGrowth Title -->
      <text x="0" y="60" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="82" font-weight="900" fill="#041e42" letter-spacing="-3">VibeGrowth</text>
      
      <!-- Elegant horizontal line + SOLUTION text -->
      <!-- Left line -->
      <line x1="16" y1="114" x2="120" y2="114" stroke="#041e42" stroke-width="3" opacity="0.8" />
      
      <!-- SOLUTION tracking-spaced text -->
      <text x="138" y="124" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#041e42" letter-spacing="16">SOLUTION</text>
      
      <!-- Right line -->
      <line x1="432" y1="114" x2="536" y2="114" stroke="#041e42" stroke-width="3" opacity="0.8" />
    </g>
  </g>
</svg>
